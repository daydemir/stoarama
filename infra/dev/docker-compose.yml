version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: social_isolation
      POSTGRES_USER: social_isolation
      POSTGRES_PASSWORD: social_isolation
    ports:
      - "54329:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minio minio123456) do echo 'waiting for minio' && sleep 1; done;
      /usr/bin/mc mb -p local/stoarama || true;
      /usr/bin/mc anonymous set none local/stoarama || true;
      exit 0;
      "

volumes:
  pgdata:
  minio_data:
