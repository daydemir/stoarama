<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stoarama Account</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #111827;
      --panel2: #182233;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #1e293b;
      --accent: #06b6d4;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --mono: "IBM Plex Mono", monospace;
      --sans: "IBM Plex Sans", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f5f9;
        --panel: #ffffff;
        --panel2: #f8fafc;
        --text: #0f172a;
        --muted: #4b5563;
        --border: #e2e8f0;
        --accent: #0891b2;
        --ok: #16a34a;
        --warn: #d97706;
        --err: #dc2626;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 10%, transparent) 0, transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 96%, #000) 0%, var(--bg) 58%, color-mix(in srgb, var(--bg) 88%, #07101f) 100%);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell { max-width: 1440px; margin: 0 auto; padding: 18px 20px 42px; }
    .acct-content { max-width: 720px; margin: 0 auto; display: grid; gap: 14px; }
    .panel {
      background: color-mix(in srgb, var(--panel) 94%, #000);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.18);
    }
    h2 { margin: 0 0 12px; font-size: 15px; line-height: 1.15; }
    p, .note, .muted { color: var(--muted); line-height: 1.5; }
    .status { min-height: 18px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .hidden { display: none !important; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input, button {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel2) 84%, transparent);
      color: var(--text);
      font: inherit;
      padding: 9px 12px;
    }
    input { width: 100%; }
    input::placeholder { color: color-mix(in srgb, var(--muted) 75%, transparent); }
    /* Base button = clear ghost/outline: visible border, dark text, clickable.
       The primary fill + disabled dim come from shell.go's authoritative rules. */
    button {
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      width: auto;
    }
    button:hover { background: color-mix(in srgb, var(--panel2) 70%, transparent); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
    button.primary:hover { background: color-mix(in srgb, var(--accent) 88%, #000); }
    button.small { min-height: 30px; padding: 5px 12px; font-size: 12px; }
    /* Read-only value row + list rows */
    .kv-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .kv-val { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-all; }
    .role-badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--border); background: color-mix(in srgb, var(--panel2) 80%, transparent);
      font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
    }
    .row-list { display: grid; gap: 8px; }
    .row-item {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px;
      background: color-mix(in srgb, var(--panel2) 86%, transparent);
    }
    .row-item .row-main { flex: 1 1 auto; min-width: 0; display: flex; align-items: center; gap: 8px; }
    .row-item .row-name { font-family: var(--mono); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sub { color: var(--muted); font-size: 12px; }
    /* Mobile: let the Profile email wrap and keep it off the card edge. */
    @media (max-width: 480px) {
      /* Allow grid/flex items to shrink below their content min-size so long
         emails wrap instead of forcing horizontal overflow. */
      .acct-content, #authedBox, .panel { min-width: 0; }
      .acct-content > *, #authedBox > * { min-width: 0; }
      .kv-row { flex-wrap: wrap; }
      .kv-row .row-main { flex: 1 1 100%; min-width: 0; flex-wrap: wrap; }
      .row-list { grid-template-columns: minmax(0, 1fr); }
      .row-item { min-width: 0; }
      .row-item .row-name { min-width: 0; }
      .kv-val {
        min-width: 0; flex: 1 1 100%; text-align: right; padding-right: 2px;
        overflow-wrap: anywhere; word-break: break-word; max-width: 100%;
      }
      #sessionEmail { text-align: left; }
      /* Touch-friendly tap targets (>=44px). */
      button.small { min-height: 44px; padding: 10px 14px; }
      /* Prevent iOS Safari focus auto-zoom on the sign-in input. */
      input { font-size: 16px; }
      /* Keep small labels/pills legible (>=13px). */
      .role-badge { font-size: 13px; }
      .sub { font-size: 13px; }
      .status { font-size: 13px; }
    }
  </style>
<!--SHELL_HEAD-->
</head>
<body>
  <div class="shell">
    <!--SHELL_TOPBAR-->

    <div class="acct-content">

    <!-- Signed-in content -->
    <div id="authedBox" class="hidden" style="display:grid;gap:14px;">
      <section class="panel">
        <h2>Profile</h2>
        <div class="kv-row">
          <span class="sub">Email</span>
          <span id="profileEmail" class="kv-val"></span>
        </div>
      </section>

      <section class="panel">
        <h2>Session</h2>
        <div class="kv-row">
          <div class="row-main" style="display:flex;align-items:center;gap:8px;min-width:0;">
            <span id="sessionEmail" class="kv-val"></span>
            <span id="sessionRole" class="role-badge"></span>
          </div>
          <button id="logoutBtn" class="small" type="button">Log out</button>
        </div>
        <div id="sessionMeta" class="sub" style="margin-top:8px;"></div>
      </section>

      <section class="panel">
        <h2>Your orgs</h2>
        <div id="orgsList" class="row-list"></div>
        <div style="margin-top:12px;">
          <button id="newOrgBtn" class="primary small" type="button">New org</button>
        </div>
        <div id="orgsStatus" class="status" style="margin-top:8px;"></div>
      </section>
    </div>

    <!-- Logged-out content -->
    <section id="signinPanel" class="panel hidden">
      <h2>Sign in</h2>
      <form id="signinForm">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.org" />
        <div style="margin-top:12px;">
          <button id="requestLink" class="primary" type="submit">Send sign-in link</button>
        </div>
        <div id="requestStatus" class="status" style="margin-top:8px;"></div>
      </form>
    </section>

    <div id="accountStatus" class="status"></div>

    </div>
  </div>

  <script>
    const requestStatus = document.getElementById('requestStatus');
    const signinForm = document.getElementById('signinForm');
    const accountStatus = document.getElementById('accountStatus');
    const authedBox = document.getElementById('authedBox');
    const signinPanel = document.getElementById('signinPanel');
    const profileEmail = document.getElementById('profileEmail');
    const sessionEmail = document.getElementById('sessionEmail');
    const sessionRole = document.getElementById('sessionRole');
    const sessionMeta = document.getElementById('sessionMeta');
    const orgsList = document.getElementById('orgsList');
    const orgsStatus = document.getElementById('orgsStatus');
    const newOrgBtn = document.getElementById('newOrgBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const authParams = new URLSearchParams(window.location.search);
    const authCompleted = String(authParams.get('auth') || '').trim().toLowerCase() === 'complete';
    const authErrorMessages = Object.freeze({
      expired_token: 'That sign-in link expired. Request a new link.',
      invalid_token: 'That sign-in link is invalid. Request a new link.',
      missing_token: 'That sign-in link is missing its token. Request a new link.',
      account_disabled: 'This account is disabled.',
      server_error: 'We could not complete sign-in. Request a new link.',
    });
    const authError = String(authParams.get('error') || '').trim().toLowerCase();
    function authErrorMessage() {
      return authErrorMessages[authError] || '';
    }
    function cleanRedirectPath(raw) {
      const v = String(raw || '').trim();
      if (!v.startsWith('/') || v.startsWith('//')) return '/account';
      try {
        const url = new URL(v, window.location.origin);
        if (url.origin !== window.location.origin) return '/account';
        ['auth', 'error', 'redirect_path', 'token'].forEach((key) => url.searchParams.delete(key));
        url.hash = '';
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (_) {
        return '/account';
      }
    }
    const requestedRedirectPath = (() => {
      return cleanRedirectPath(authParams.get('redirect_path'));
    })();

    let currentAccount = null;
    let currentOrg = null;
    let authFlowRedirectTimer = null;

    async function fetchJSON(path, opts = {}) {
      const method = String((opts && opts.method) || 'GET').toUpperCase();
      const headers = { ...(opts.headers || {}) };
      if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method) && !headers['Idempotency-Key']) {
        headers['Idempotency-Key'] = `${method}:${path}:${Date.now()}:${Math.random().toString(36).slice(2)}`;
      }
      const res = await fetch(path, { ...opts, credentials: 'include', headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `request failed (${res.status})`);
      return data;
    }

    function setStatus(el, text, kind) {
      if (!(el instanceof HTMLElement)) return;
      el.textContent = text || '';
      el.className = `status${kind ? ` ${kind}` : ''}`;
    }

    function escapeHTML(v) {
      return String(v == null ? '' : v)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function sleep(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function accountContinueTarget() {
      return requestedRedirectPath !== '/account' ? requestedRedirectPath : '';
    }

    function clearAuthCompleteParam() {
      if (!authCompleted) return;
      const next = new URL(window.location.href);
      next.searchParams.delete('auth');
      const search = next.searchParams.toString();
      history.replaceState(null, '', `${next.pathname}${search ? `?${search}` : ''}${next.hash || ''}`);
    }

    async function fetchCurrentPayloadWithRetry() {
      let lastErr = null;
      const attempts = authCompleted ? 6 : 1;
      for (let i = 0; i < attempts; i += 1) {
        try {
          return await fetchJSON('/api/v1/account/me');
        } catch (err) {
          lastErr = err;
          if (i < attempts - 1) await sleep(250);
        }
      }
      throw lastErr || new Error('unauthorized');
    }

    function scheduleAuthFlowContinue() {
      if (authFlowRedirectTimer) {
        window.clearTimeout(authFlowRedirectTimer);
        authFlowRedirectTimer = null;
      }
      const target = accountContinueTarget();
      if (!target) { clearAuthCompleteParam(); return; }
      authFlowRedirectTimer = window.setTimeout(() => { window.location.assign(target); }, 1600);
    }

    // The top-right account chip + org switcher are owned by the shared topbar shell
    // (backend/internal/api/shell.go). No per-page topbar wiring here.

    async function switchOrg(id) {
      await fetchJSON(`/api/v1/account/orgs/${encodeURIComponent(id)}/switch`, { method: 'POST' });
      window.location.reload();
    }

    function renderOrgs(orgs) {
      const list = Array.isArray(orgs) ? orgs : [];
      const currentId = Number((currentOrg && currentOrg.id) || 0);
      orgsList.innerHTML = list.map((o) => {
        const oid = Number(o.id);
        const name = String(o.name || 'Org');
        const role = String(o.role || 'member');
        const isCur = oid === currentId;
        const action = isCur
          ? `<span class="sub">Current</span>`
          : `<button class="small org-switch" type="button" data-org="${oid}">Switch</button>`;
        return `<div class="row-item">
          <div class="row-main">
            <span class="row-name">${escapeHTML(name)}</span>
            <span class="role-badge">${escapeHTML(role)}</span>
          </div>
          ${action}
        </div>`;
      }).join('');
      orgsList.querySelectorAll('.org-switch').forEach((btn) => {
        btn.addEventListener('click', () => switchOrg(Number(btn.getAttribute('data-org'))).catch((err) => setStatus(orgsStatus, String(err.message || err), 'err')));
      });
    }

    newOrgBtn.addEventListener('click', async () => {
      const name = String(window.prompt('Name your new org:') || '').trim();
      if (!name) return;
      newOrgBtn.disabled = true;
      try {
        const org = await fetchJSON('/api/v1/account/orgs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        await switchOrg(org.id);
      } catch (err) {
        setStatus(orgsStatus, String(err.message || err), 'err');
        newOrgBtn.disabled = false;
      }
    });

    async function refreshSession() {
      try {
        const payload = await fetchCurrentPayloadWithRetry();
        currentAccount = payload.account || {};
        currentOrg = payload.current_org || null;
        const email = String(currentAccount.email || '').trim();
        const role = String(currentAccount.role || 'member');
        const authType = String(currentAccount.auth_type || 'session');

        authedBox.classList.remove('hidden');
        signinPanel.classList.add('hidden');
        profileEmail.textContent = email;
        sessionEmail.textContent = email;
        sessionRole.textContent = role;
        sessionMeta.textContent = `${role} · ${authType}`;
        renderOrgs(payload.orgs);

        const continueTarget = accountContinueTarget();
        if (authCompleted && continueTarget) {
          setStatus(accountStatus, `Signed in as ${email}. Continuing to ${continueTarget}...`, 'ok');
          scheduleAuthFlowContinue();
        } else if (authErrorMessage()) {
          setStatus(accountStatus, authErrorMessage(), 'err');
        } else {
          setStatus(accountStatus, '', '');
          if (authCompleted) clearAuthCompleteParam();
        }
      } catch (_) {
        currentAccount = null;
        currentOrg = null;
        authedBox.classList.add('hidden');
        signinPanel.classList.remove('hidden');
        if (authCompleted) {
          setStatus(accountStatus, 'Sign-in link opened, but this browser has no active session. Open the link in the browser you want to use.', 'err');
        } else if (authErrorMessage()) {
          setStatus(accountStatus, authErrorMessage(), 'err');
        } else {
          setStatus(accountStatus, '', '');
        }
      }
    }

    signinForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = String(document.getElementById('email').value || '').trim();
      try {
        await fetchJSON('/api/v1/auth/request-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, redirect_path: requestedRedirectPath }),
        });
        setStatus(requestStatus, 'Sign-in link sent', 'ok');
      } catch (err) {
        setStatus(requestStatus, String(err), 'err');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await fetchJSON('/api/v1/account/logout', { method: 'POST' });
      } catch (_) {}
      window.location.reload();
    });

    void refreshSession();
  </script>
</body>
</html>
