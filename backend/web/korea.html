<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sto-A-Rama Korea</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #111827;
      --panel2: #182233;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #1e293b;
      --accent: #06b6d4;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --mono: "IBM Plex Mono", monospace;
      --sans: "IBM Plex Sans", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f5f9;
        --panel: #ffffff;
        --panel2: #f8fafc;
        --text: #0f172a;
        --muted: #4b5563;
        --border: #e2e8f0;
        --accent: #0891b2;
        --ok: #16a34a;
        --warn: #d97706;
        --err: #dc2626;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      font-size: 13px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--bg) 96%, #000) 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell { max-width: 1440px; margin: 0 auto; padding: 18px 20px 42px; }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      min-height: 40px;
    }
    .topbar-left, .topbar-center, .topbar-right { display: flex; align-items: center; min-width: 0; }
    .topbar-left { gap: 10px; overflow: hidden; }
    .topbar-center { justify-content: center; }
    .topbar-right { gap: 10px; justify-content: flex-end; }
    .site-title { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; color: var(--accent); font-family: var(--mono); }
    .metrics-row { display: flex; flex-wrap: nowrap; gap: 6px; min-width: 0; overflow: hidden; }
    .metric-chip {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
    }
    .metric-chip b { color: var(--text); font-weight: 500; }
    .global-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 90%, #000);
    }
    .global-nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }
    .global-nav a.active { color: #fff; background: var(--accent); border-color: var(--accent); }
    .global-nav a:hover { color: var(--text); border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); background: color-mix(in srgb, var(--panel2) 78%, transparent); text-decoration: none; }
    .account-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, #000);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .domain-intro {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin: 8px 0 16px;
    }
    .domain-intro-title { font-family: var(--mono); font-size: 22px; font-weight: 600; letter-spacing: 0.02em; }
    .domain-intro-copy { color: var(--muted); max-width: 82ch; line-height: 1.5; }
    .summary-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .summary-chip b { color: var(--text); font-weight: 500; }
    .summary-chip.ok { color: #bbf7d0; border-color: color-mix(in srgb, var(--ok) 35%, var(--border)); }
    .summary-chip.warn { color: #fde68a; border-color: color-mix(in srgb, var(--warn) 35%, var(--border)); }
    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: color-mix(in srgb, var(--panel2) 80%, transparent);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 78%, transparent);
    }
    .section-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .section-title strong { font-size: 15px; line-height: 1.2; }
    .section-title span { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .section-meta { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .chip b { color: var(--text); font-weight: 500; }
    .entrypoint {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
    }
    .entrypoint:first-child { border-top: 0; }
    .entrypoint-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .entrypoint-head strong { font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.04em; }
    .entrypoint-head span { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 10px; border-top: 1px solid var(--border); vertical-align: top; text-align: left; }
    th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); background: color-mix(in srgb, var(--panel) 92%, transparent); }
    td { font-size: 12px; }
    .muted { color: var(--muted); }
    .mono { font-family: var(--mono); }
    .stream-name { display: flex; flex-direction: column; gap: 4px; }
    .stream-name strong { font-size: 12px; line-height: 1.25; }
    .stream-name span { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
    }
    .badge.ok { color: #bbf7d0; border-color: color-mix(in srgb, var(--ok) 35%, var(--border)); }
    .badge.warn { color: #fde68a; border-color: color-mix(in srgb, var(--warn) 35%, var(--border)); }
    .badge.err { color: #fecaca; border-color: color-mix(in srgb, var(--err) 35%, var(--border)); }
    .links { display: flex; flex-direction: column; gap: 4px; }
    .links a { overflow-wrap: anywhere; }
    .unresolved {
      border: 1px solid color-mix(in srgb, var(--err) 40%, var(--border));
      background: color-mix(in srgb, var(--err) 8%, var(--panel));
      border-radius: 10px;
      padding: 12px 14px 14px;
      margin-top: 14px;
    }
    .empty {
      padding: 18px 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }
    @media (max-width: 1100px) {
      .topbar { grid-template-columns: minmax(0, 1fr); overflow-x: auto; }
      .topbar-center, .topbar-right { justify-content: flex-start; }
      .section-head, .entrypoint-head { flex-direction: column; align-items: flex-start; }
      .section-meta { justify-content: flex-start; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="site-title">STO-A-RAMA</span>
      <div class="metrics-row" id="metricsRow"></div>
    </div>
    <div class="topbar-center">
      <nav class="global-nav" aria-label="Global">
        <a href="/streams">Streams</a>
        <a href="/korea" class="active">Korea</a>
        <a href="/recording">Recording</a>
        <a href="/docs/getting-started">Docs</a>
      </nav>
    </div>
    <div class="topbar-right">
      <a class="account-chip" href="/admin" aria-label="Admin">⚙</a>
      <div class="account-chip" id="statusChip">Loading...</div>
    </div>
  </div>

  <div class="domain-intro">
    <div class="domain-intro-title">Korea</div>
    <div class="domain-intro-copy">Browse the Korean CCTV streams by upstream source family.</div>
  </div>

  <div class="summary-row" id="summaryRow"></div>
  <div class="section">
    <div class="section-head">
      <div class="section-title">
        <strong>Streams</strong>
        <span>filtered by upstream source family</span>
      </div>
      <div class="section-meta">
        <label class="chip" style="display:inline-flex; gap:8px; align-items:center;">
          <span>Source</span>
          <select id="sourceFilter" style="height:24px; padding:2px 8px; min-width:180px;">
            <option value="">all sources</option>
          </select>
        </label>
      </div>
    </div>
    <div class="entrypoint" style="border-top: 0;">
      <table>
        <thead>
          <tr>
            <th style="width: 34%;">Stream</th>
            <th style="width: 12%;">Source</th>
            <th style="width: 14%;">Entrypoint</th>
            <th style="width: 20%;">Source page</th>
            <th style="width: 20%;">Stream URL</th>
          </tr>
        </thead>
        <tbody id="streamRows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const sourceFilter = $('sourceFilter');
const streamRowsEl = $('streamRows');
let flatStreams = [];
function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
async function loadJSON(path) {
  const resp = await fetch(path, { credentials: 'same-origin' });
  if (!resp.ok) throw new Error(`GET ${path} status=${resp.status}`);
  return await resp.json();
}
function chip(label, value, cls = '') {
  return `<span class="summary-chip ${cls}">${esc(label)} <b>${esc(String(value ?? 0))}</b></span>`;
}
function flattenInventory(inv) {
  const out = [];
  for (const family of (inv && inv.families) || []) {
    for (const group of (family.entrypoints || [])) {
      for (const item of (group.streams || [])) {
        out.push({
          family: String(family.family || ''),
          family_label: String(family.label || family.family || ''),
          entrypoint: String(group.entrypoint || ''),
          entrypoint_label: String(group.label || group.entrypoint || ''),
          stream: item && item.stream ? item.stream : {},
        });
      }
    }
  }
  return out;
}
function renderSummary(inv) {
  const summary = inv && inv.summary ? inv.summary : {};
  $('summaryRow').innerHTML = [
    chip('families', summary.total_families),
    chip('covered', summary.covered_families),
    chip('streams', summary.total_streams),
    chip('resolved', summary.resolved_streams),
    chip('unresolved', summary.unresolved_streams, summary.unresolved_streams > 0 ? 'warn' : 'ok'),
    chip('status', summary.complete ? 'complete' : 'needs review', summary.complete ? 'ok' : 'warn'),
  ].join('');
  $('metricsRow').innerHTML = [
    `<span class="metric-chip">families <b>${esc(String(summary.total_families ?? 0))}</b></span>`,
    `<span class="metric-chip">streams <b>${esc(String(summary.total_streams ?? 0))}</b></span>`,
    `<span class="metric-chip">unresolved <b>${esc(String(summary.unresolved_streams ?? 0))}</b></span>`,
  ].join('');
  $('statusChip').innerHTML = `<span class="badge ${summary.complete ? 'ok' : 'warn'}">${summary.complete ? 'complete' : 'needs review'}</span> <span class="muted">${esc(new Date(inv.retrieved_at).toLocaleString())}</span>`;
}
function renderSourceOptions(inv) {
  const families = (inv && inv.families) || [];
  const prev = String(sourceFilter.value || '').trim();
  sourceFilter.innerHTML = '<option value="">all sources</option>' + families.map((family) => {
    const value = String(family.family || '').trim();
    const label = String(family.label || value || '-');
    return `<option value="${esc(value)}"${value === prev ? ' selected' : ''}>${esc(label)}</option>`;
  }).join('');
  if (!families.some((family) => String(family.family || '') === prev)) {
    sourceFilter.value = '';
  }
}
function renderRows() {
  const selected = String(sourceFilter.value || '').trim();
  const rows = flatStreams.filter((item) => !selected || String(item.family || '') === selected);
  streamRowsEl.innerHTML = rows.length ? rows.map((item) => {
    const s = item.stream || {};
    return `
      <tr>
        <td>
          <div class="stream-name">
            <strong><a href="/streams/${esc(s.id)}">${esc(String(s.name || `#${s.id}`))}</a></strong>
            <span>#${esc(s.id)} · ${esc(String(s.provider || '-'))} · ${esc(String(s.recording_state || '-'))}</span>
            ${s.location_text ? `<span>${esc(String(s.location_text))}</span>` : ''}
          </div>
        </td>
        <td class="mono">${esc(item.family_label || item.family || '-')}</td>
        <td class="mono">${esc(item.entrypoint_label || item.entrypoint || '-')}</td>
        <td class="links">
          ${s.source_page_url ? `<a href="${esc(s.source_page_url)}" target="_blank" rel="noopener noreferrer">${esc(s.source_page_url)}</a>` : '<span class="muted">-</span>'}
        </td>
        <td class="links">
          ${s.source_url ? `<a href="${esc(s.source_url)}" target="_blank" rel="noopener noreferrer">${esc(s.source_url)}</a>` : '<span class="muted">-</span>'}
        </td>
      </tr>
    `;
  }).join('') : '<tr><td colspan="5" class="empty">No streams in this source</td></tr>';
}
async function main() {
  try {
    const payload = await loadJSON('/api/v1/korea/inventory');
    flatStreams = flattenInventory(payload);
    renderSummary(payload);
    renderSourceOptions(payload);
    renderRows();
  } catch (err) {
    $('summaryRow').innerHTML = '<span class="summary-chip warn">failed to load</span>';
    streamRowsEl.innerHTML = `<tr><td colspan="5" class="empty">${esc(String(err || 'failed to load'))}</td></tr>`;
  }
}
sourceFilter.addEventListener('change', () => renderRows());
main();
</script>
</body>
</html>
