# Stoarama NAS pull client for Synology Container Manager.
#
# Create /volume1/stoarama-clips and /volume1/stoarama-state, then replace the
# API key and connection id below. The one-line launcher verifies an immutable
# recovery bootstrap. The durable client checks for verified updates every ten
# minutes; future updates do not require compose changes.

services:
  stoarama-pull:
    image: python:3.13-slim-bookworm@sha256:9d7f287598e1a5a978c015ee176d8216435aaf335ed69ac3c38dd1bbb10e8d64
    restart: always
    environment:
      STOARAMA_API_BASE: "https://stoarama.com/api/v1"
      STOARAMA_API_KEY: "sir_REPLACE_ME"
      STOARAMA_CONNECTION_ID: "REPLACE_ME"
      STOARAMA_OUTPUT_DIR: "/clips"
      STOARAMA_STATE_DIR: "/state"
      STOARAMA_POLL_INTERVAL_SEC: "60"
      STOARAMA_UPDATE_MANIFEST_URL: "https://stoarama.com/nas/download/latest.json"
      STOARAMA_DRY_RUN: "0"
      PYTHONUNBUFFERED: "1"
    command: ["python3", "-c", "import hashlib,os,urllib.request\np='/state/stoarama-bootstrap-v1.py'\nexpected='d5090901745beed24c3aedd5638ca745e1e9317d0706dc51e84c7759878f7683'\nos.makedirs('/state',exist_ok=True)\ntry:\n    source=urllib.request.urlopen('https://stoarama.com/nas/download/stoarama-bootstrap-v1.py',timeout=30).read()\n    if hashlib.sha256(source).hexdigest()!=expected: raise RuntimeError('NAS bootstrap checksum mismatch')\n    temporary=p+'.new'\n    with open(temporary,'wb') as output:\n        output.write(source); output.flush(); os.fsync(output.fileno())\n    os.replace(temporary,p)\nexcept Exception:\n    with open(p,'rb') as cached: source=cached.read()\nif hashlib.sha256(source).hexdigest()!=expected: raise RuntimeError('cached NAS bootstrap checksum mismatch')\nexec(compile(source,'stoarama-bootstrap-v1.py','exec'))"]
    volumes:
      - /volume1/stoarama-clips:/clips
      - /volume1/stoarama-state:/state
