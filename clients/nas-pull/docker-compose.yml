# Stoarama NAS pull client for a Synology NAS (or any Docker host).
#
# WHAT THIS DOES
#   Stoarama records public streams to managed Cloudflare R2. The NAS is not
#   inbound-reachable, so this container PULLS each clip down to local disk,
#   verifies its byte count against the API, then asks Stoarama to release the
#   managed copy. A clip is released only after a verified download
#   (confirm-before-release). The cursor (last drained clip id) is persisted so a
#   restart resumes where it left off.
#
# SETUP IS PASTE-ONLY. There is nothing to build and no source files to copy.
# This runs the stock public python:3-slim image; the container fetches the
# dependency-free client (stoarama_pull.py, Python stdlib only) from the public
# repo at start and runs it. All you provide is the two folders below and your key.
#
#   1. Install "Container Manager" from the Synology Package Center.
#   2. Create two shared folders on the NAS:
#        /volume1/stoarama-clips
#        /volume1/stoarama-state
#   3. Container Manager > Project > Create. Set the path to any empty folder
#      (e.g. /volume1/docker/stoarama). Paste this compose as the source. Nothing
#      else goes in that folder.
#   4. Set STOARAMA_API_KEY to your sir_ pull key (the Stoarama dashboard shows it
#      once when you create the NAS connection; Rotate issues a fresh one).
#   5. Start the project. "restart: always" keeps it running across reboots. Come
#      back to the dashboard and Refresh; within a minute or two it turns GREEN.
#      To validate read-only first, set STOARAMA_DRY_RUN to "1" (downloads and
#      verifies, never releases, cursor not persisted), then set it back to "0".

services:
  stoarama-pull:
    image: python:3-slim
    restart: always
    environment:
      STOARAMA_API_BASE: "https://stoarama.com/api/v1"
      STOARAMA_API_KEY: "sir_REPLACE_ME"
      STOARAMA_OUTPUT_DIR: "/clips"
      STOARAMA_STATE_FILE: "/state/cursor.json"
      STOARAMA_POLL_INTERVAL_SEC: "60"
      # "1" = read-only validate (download + verify, never release, cursor not
      # persisted). "0" = live (release the managed copy after a verified download).
      STOARAMA_DRY_RUN: "0"
      PYTHONUNBUFFERED: "1"
    command: ["python3", "-c", "import urllib.request, runpy; urllib.request.urlretrieve('https://raw.githubusercontent.com/daydemir/stoarama/main/clients/nas-pull/stoarama_pull.py', '/tmp/stoarama_pull.py'); runpy.run_path('/tmp/stoarama_pull.py', run_name='__main__')"]
    volumes:
      - /volume1/stoarama-clips:/clips
      - /volume1/stoarama-state:/state
