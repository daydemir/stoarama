name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
        env:
          POSTGRES_DB: stoarama_test
          POSTGRES_USER: stoarama
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stoarama -d stoarama_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test PostgreSQL type boundaries
        env:
          STOARAMA_TEST_DATABASE_URL: postgres://stoarama@localhost:5432/stoarama_test?sslmode=disable
        run: go test ./internal/recordingnaming -run TestLockOrganizationPlazaIDsAcceptsIntegerAccountID -count=1
      - name: Test NAS backlog eligibility
        env:
          STOARAMA_TEST_DATABASE_URL: postgres://stoarama@localhost:5432/stoarama_test?sslmode=disable
        run: go test ./internal/api -run TestConnectionPendingClipsEligibility -count=1
      - name: Test batch Plaza naming
        env:
          STOARAMA_TEST_DATABASE_URL: postgres://stoarama@localhost:5432/stoarama_test?sslmode=disable
        run: go test ./internal/api -run TestBatchSchedulePersistsPlazaHourlyNamingAndDaytimeWindow -count=1
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
