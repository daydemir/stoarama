name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history so the scan covers every commit, not just the tip
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
