databases:
  - name: stoarama-db
    databaseName: stoarama
    user: stoarama
    plan: basic-1gb

services:
  - type: web
    name: stoarama-api
    env: go
    rootDir: backend
    autoDeployTrigger: commit
    # Vendor a static linux ffmpeg into bin/ during build. Render env:go has no
    # ffmpeg on PATH, and capture.CaptureFrame shells to $FFMPEG_BIN for
    # non-image streams (needed by the survey feature). The static build is
    # downloaded fresh each build, extracted, and placed at bin/ffmpeg.
    # FFMPEG_BIN below points the app at it. rootDir is backend, so bin/ and the
    # ./bin/ffmpeg path both resolve relative to backend/.
    buildCommand: |
      set -euo pipefail
      go build -o bin/stoarama-api ./cmd/stoarama-api
      curl -fsSL -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
      mkdir -p /tmp/ffmpeg-extract
      tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
      cp /tmp/ffmpeg-extract/ffmpeg bin/ffmpeg
      chmod +x bin/ffmpeg
      ./bin/ffmpeg -version
    startCommand: ./bin/stoarama-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: AUTO_MIGRATE
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGN_GET_TTL
        value: 10m
      - key: R2_SIGN_PUT_TTL
        value: 15m
      - key: APP_BASE_URL
        value: https://stoarama-api.onrender.com
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: EMAIL_PROVIDER
        value: log
      - key: MAGIC_LINK_TTL
        value: 20m
      - key: SESSION_TTL
        value: 720h
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_RESEND_API_KEY
        sync: false
      - key: BOX_WORKER_EMBEDDED
        value: "true"
      - key: BOX_WORKER_POLL_SEC
        value: "1"
      - key: BOX_WORKER_CONCURRENCY
        value: "8"
      - key: BOX_WORKER_LEASE_SEC
        value: "300"
      - key: BOX_WORKER_MAX_ATTEMPTS
        value: "8"
      - key: BOX_WORKER_RETRY_BASE_SEC
        value: "5"
      - key: BOX_WORKER_RETRY_MAX_SEC
        value: "300"
      - key: FFMPEG_BIN
        value: ./bin/ffmpeg
      # Survey runs on the dedicated stoarama-survey cron service below, not on
      # this web dyno (keeps the public API stable). Leave embedded survey off.
      - key: SURVEY_ENABLED
        value: "false"
      - key: SURVEY_CONCURRENCY
        value: "4"

  # Daily stream survey: one JPEG per non-pruned stream per day, captured on an
  # isolated cron instance so the heavy ffmpeg/yt-dlp work never touches the
  # public API dyno. The cron fires hourly; --daily-gate makes the full sweep
  # actually run during one per-day randomized UTC hour (so capture time varies
  # day to day), and the sweep is idempotent (skips streams already captured
  # today). Billed only while running. starter plan + concurrency 3 keeps peak
  # memory under 512MB.
  - type: cron
    name: stoarama-survey
    env: go
    rootDir: backend
    plan: starter
    schedule: "0 * * * *"
    autoDeployTrigger: commit
    buildCommand: |
      set -euo pipefail
      go build -o bin/stoaramactl ./cmd/stoaramactl
      curl -fsSL -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
      mkdir -p /tmp/ffmpeg-extract
      tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
      cp /tmp/ffmpeg-extract/ffmpeg bin/ffmpeg
      chmod +x bin/ffmpeg
      ./bin/ffmpeg -version
      curl -fsSL -o bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
      chmod +x bin/yt-dlp
      ./bin/yt-dlp --version
    startCommand: ./bin/stoaramactl survey run-once --daily-gate --concurrency 3 --json
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: FFMPEG_BIN
        value: ./bin/ffmpeg
      - key: YT_DLP_BIN
        value: ./bin/yt-dlp
