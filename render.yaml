databases:
  - name: stoarama-db
    databaseName: stoarama
    user: stoarama
    plan: basic-1gb

services:
  - type: web
    name: stoarama-api
    env: go
    rootDir: backend
    autoDeployTrigger: commit
    buildCommand: go build -o bin/stoarama-api ./cmd/stoarama-api
    startCommand: ./bin/stoarama-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: AUTO_MIGRATE
        value: "true"
      - key: API_TOKEN
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGN_GET_TTL
        value: 10m
      - key: R2_SIGN_PUT_TTL
        value: 15m
      - key: APP_BASE_URL
        value: https://stoarama-api.onrender.com
      - key: EMAIL_PROVIDER
        value: log
      - key: MAGIC_LINK_TTL
        value: 20m
      - key: SESSION_TTL
        value: 720h
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_RESEND_API_KEY
        sync: false
      - key: BOX_WORKER_EMBEDDED
        value: "true"
      - key: BOX_WORKER_POLL_SEC
        value: "1"
      - key: BOX_WORKER_CONCURRENCY
        value: "8"
      - key: BOX_WORKER_LEASE_SEC
        value: "300"
      - key: BOX_WORKER_MAX_ATTEMPTS
        value: "8"
      - key: BOX_WORKER_RETRY_BASE_SEC
        value: "5"
      - key: BOX_WORKER_RETRY_MAX_SEC
        value: "300"
