databases:
  - name: stoarama-db
    databaseName: stoarama
    user: stoarama
    plan: basic-1gb

services:
  - type: web
    name: stoarama-api
    env: go
    rootDir: backend
    autoDeployTrigger: commit
    # Vendor a linux ffmpeg into bin/ during build. Render env:go has no ffmpeg
    # on PATH, and the recorder create-time reachability probe shells to
    # $FFMPEG_BIN. We use the BtbN gpl build: the johnvansickle static build
    # segfaults on any network input (TLS and plain http alike) on Render's
    # kernel, which crashed every HTTPS probe; the BtbN build opens HTTPS HLS
    # cleanly. It links only standard glibc, present in the go env, and reads the
    # CA bundle from $SSL_CERT_FILE (set below to the Ubuntu base bundle, present
    # at both build and run time) for TLS cert verification. rootDir is backend,
    # so bin/ and ./bin/ffmpeg resolve relative to backend/.
    buildCommand: |
      set -euo pipefail
      go build -o bin/stoarama-api ./cmd/stoarama-api
      curl -fsSL -o /tmp/ffmpeg.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
      mkdir -p /tmp/ffmpeg-extract
      tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
      cp /tmp/ffmpeg-extract/bin/ffmpeg bin/ffmpeg
      chmod +x bin/ffmpeg
      ./bin/ffmpeg -version
    startCommand: ./bin/stoarama-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: AUTO_MIGRATE
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGN_GET_TTL
        value: 10m
      - key: R2_SIGN_PUT_TTL
        value: 15m
      - key: APP_BASE_URL
        value: https://stoarama.com
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: MAGIC_LINK_TTL
        value: 60m
      - key: SESSION_TTL
        value: 720h
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_RESEND_API_KEY
        sync: false
      - key: BOX_WORKER_EMBEDDED
        value: "true"
      - key: BOX_WORKER_POLL_SEC
        value: "1"
      - key: BOX_WORKER_CONCURRENCY
        value: "8"
      - key: BOX_WORKER_LEASE_SEC
        value: "300"
      - key: BOX_WORKER_MAX_ATTEMPTS
        value: "8"
      - key: BOX_WORKER_RETRY_BASE_SEC
        value: "5"
      - key: BOX_WORKER_RETRY_MAX_SEC
        value: "300"
      - key: FFMPEG_BIN
        value: ./bin/ffmpeg
      # The BtbN ffmpeg (OpenSSL) reads its CA bundle from SSL_CERT_FILE; point
      # it at the Ubuntu base image's system bundle (present at both build and
      # run time) so HTTPS cert verification succeeds on the reachability probe.
      # An absolute path avoids breaking the build-time curl, which inherits this
      # var, before any relative bin/ path would exist.
      - key: SSL_CERT_FILE
        value: /etc/ssl/certs/ca-certificates.crt
      # Survey runs on the dedicated stoarama-survey cron service below, not on
      # this web dyno (keeps the public API stable). Leave embedded survey off.
      - key: SURVEY_ENABLED
        value: "false"
      - key: SURVEY_CONCURRENCY
        value: "4"
      # Cloud-recordability probe: SHIP-DARK, default off. The probe never runs on
      # this web dyno (it runs via `stoaramactl recordability run-once` on a DO
      # egress host). This declares the dark default so the auto-route wiring stays
      # inert until the flag is flipped on a confirmed DO-egress probe host.
      - key: STREAM_RECORDABILITY_PROBE_ENABLED
        value: "false"
      # Standalone stream-recorder billing (Stripe). The API serves Checkout,
      # the customer portal, and the signature-verified webhook. Leaving these
      # unset disables billing and runs recordings in free mode. STRIPE_PRICE_ID +
      # STRIPE_METER_ID hold the recording_hour metered price/meter ($0.05/record-hour);
      # STRIPE_GB_MONTH_PRICE_ID + STRIPE_GB_MONTH_METER_ID hold the stream_hour_month
      # price/meter ($0.10/stream-hour-month). All four are dashboard sync:false vars.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_LIVEMODE
        sync: false
      # secretbox master key (base64, e.g. `openssl rand -base64 32`). REQUIRED
      # for the recorder: seals storage-destination credentials and unseals the
      # per-destination secret when presigning each clip upload. Must be the SAME
      # key used to encrypt existing destinations. Unset => storage-destination
      # CRUD and clip upload-intents return 503 and no clip can ever be stored.
      - key: STORAGE_CRED_KEY
        sync: false

  # Hourly recording-health check: sweeps active paid recordings for silent
  # death (a continuous recording marked done/idle mid-window producing zero
  # clips) plus stuck/exhausted jobs and overdue sampled fires, and emails
  # operators. Pure DB reads + Resend; no ffmpeg/yt-dlp needed, so this build is
  # just the Go binary. Runs at :30 to stay clear of the top-of-hour survey.
  - type: cron
    name: stoarama-recording-health
    env: go
    rootDir: backend
    plan: starter
    schedule: "30 * * * *"
    autoDeployTrigger: commit
    buildCommand: go build -o bin/stoaramactl ./cmd/stoaramactl
    startCommand: ./bin/stoaramactl recording-health run
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://stoarama.com
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_RESEND_API_KEY
        sync: false

  # Standalone stream-recorder control plane: a single always-on instance that
  # runs the cron scheduler (materializing one recording_jobs row per fire) AND
  # the droplet-pool autoscaler off the public API dyno, mirroring stoarama-survey.
  # No ffmpeg here; the heavy capture work runs on autoscaled recorder droplets.
  # STRIPE_* presence flips the billable gate on; STORAGE_CRED_KEY is not needed
  # (presign happens on the API). Single replica => no leader election.
  - type: worker
    name: stoarama-recorder-control
    env: go
    rootDir: backend
    plan: starter
    numInstances: 1
    autoDeployTrigger: commit
    buildCommand: |
      set -euo pipefail
      go build -o bin/stoaramactl ./cmd/stoaramactl
    startCommand: ./bin/stoaramactl recorder-control run
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stoarama-db
          property: connectionString
      - key: SERVICE_TOKEN
        sync: false
      - key: APP_BASE_URL
        value: https://stoarama.com
      - key: REC_SCHED_ENABLED
        value: "true"
      - key: REC_SCHED_TICK_SEC
        value: "15"
      - key: REC_SCHED_CATCHUP_SEC
        value: "900"
      - key: REC_SCHED_MIN_INTERVAL_SEC
        value: "600"
      - key: REC_SCHED_MAX_JOBS_PER_TICK
        value: "500"
      # STRIPE_PRICE_ID/STRIPE_METER_ID hold the recording_hour objects
      # ($0.05/record-hour); STRIPE_GB_MONTH_PRICE_ID/STRIPE_GB_MONTH_METER_ID hold the
      # stream_hour_month objects ($0.10/stream-hour-month). All dashboard sync:false.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_LIVEMODE
        sync: false
      # Droplet-pool autoscaler. DO_API_TOKEN is the operator-scoped DigitalOcean
      # token. DROPLET_POOL_OPERATOR_EMAIL (defaults to BOOTSTRAP_ADMIN_EMAIL) is
      # the admin account that owns the per-droplet local_recorder node tokens.
      # The project + firewall ids reuse the existing DO project and the egress
      # firewall that blocks the metadata IP / RFC1918 (S-1). DROPLET_POOL_MAX is
      # the hard spend cap. These values are auto-synced by the Render Blueprint on
      # every push, so they MUST match the live prod config: the pool is enabled and
      # Capacity is baked into the prebuilt droplet image (DROPLET_POOL_IMAGE), so a
      # mismatch here would clobber prod on deploy.
      - key: DO_API_TOKEN
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: DROPLET_POOL_ENABLED
        value: "true"
      - key: DROPLET_POOL_TICK_SEC
        value: "30"
      - key: DROPLET_POOL_LOOKAHEAD_SEC
        value: "1800"
      # Capacity is baked into the prebuilt droplet image; it MUST equal
      # RECORDING_WORKER_CONCURRENCY (C-cap invariant) and changing it needs a
      # droplet image rebuild, so keep both at 5 to match the live image.
      - key: DROPLET_POOL_CAPACITY
        value: "5"
      - key: RECORDING_WORKER_CONCURRENCY
        value: "5"
      - key: DROPLET_POOL_PROVISION_LEAD_SEC
        value: "600"
      - key: DROPLET_POOL_PROVISION_TIMEOUT_SEC
        value: "900"
      - key: DROPLET_POOL_IDLE_GRACE_SEC
        value: "600"
      - key: DROPLET_POOL_DRAIN_TIMEOUT_SEC
        value: "600"
      - key: DROPLET_POOL_SCALEUP_COOLDOWN_SEC
        value: "60"
      - key: DROPLET_POOL_SCALEDOWN_COOLDOWN_SEC
        value: "300"
      # Drain-to-zero default: with MIN=0 the pool drains fully to zero when there is
      # no near-term demand (cheapest), and the autoscaler provisions a droplet AHEAD
      # of each upcoming fire / continuous-window open by DROPLET_POOL_PROVISION_LEAD_SEC.
      # Cold-start safety depends on DROPLET_POOL_IMAGE being rebaked from main HEAD: a
      # snapshot whose baked binary matches HEAD makes a cold boot snapshot-time only
      # (~1-2min), which fits inside the 600s (10min) lead, so no fire from a cold pool
      # misses. A from-scratch go build on this size is ~13-15min and does NOT fit the
      # lead, so the boot fast-path (do.go) must skip the build on a sha match: REBAKE
      # the image after any recorder/cloud-init change so a cold MIN=0 boot stays fast.
      # The lead-miss WARNING + the 900s provision-timeout reap remain the backstops.
      # Set to 1 to keep one warm droplet at zero demand instead.
      - key: DROPLET_POOL_MIN
        value: "0"
      # Hard spend cap = ceiling Max*Capacity concurrent clips. Capacity=5 is baked
      # into the droplet image, so the ceiling is Max*5. Max=20 => 100 concurrent,
      # the largest value that fits under the DigitalOcean account droplet_limit
      # (25, with headroom for orphan-reap churn). Reaching true 1000-concurrent
      # (200+ droplets) requires a DO droplet-limit increase first. Override per
      # environment via the Render env var (the live prod value wins over this).
      - key: DROPLET_POOL_MAX
        value: "20"
      # Most droplets to provision in one tick. Lets a large demand jump (e.g. a
      # 100-stream bundle => 20 droplets) be met over a few ticks instead of one
      # droplet per scale-up cooldown, bounded so a single tick's DO API burst is sane.
      - key: DROPLET_POOL_MAX_SCALEUP_BATCH
        value: "4"
      - key: DROPLET_POOL_REGION
        value: nyc1
      - key: DROPLET_POOL_SIZE
        value: s-2vcpu-4gb
      - key: DROPLET_POOL_IMAGE
        sync: false
      - key: DROPLET_POOL_SSH_KEY
        sync: false
      - key: DROPLET_POOL_PROJECT_ID
        sync: false
      - key: DROPLET_POOL_FIREWALL_ID
        sync: false
      # Recorder droplets call the API at high volume; keep them on the direct
      # Render origin, NOT the Cloudflare-proxied stoarama.com, to avoid edge
      # bot-throttling. This is internal traffic, never shown to users.
      - key: DROPLET_POOL_BACKEND_API_URL
        value: https://stoarama-api.onrender.com
      - key: DROPLET_POOL_REPO_URL
        value: https://github.com/daydemir/stoarama.git
      - key: DROPLET_POOL_REPO_REF
        value: main
      - key: DROPLET_POOL_REPO_CLONE_TOKEN
        sync: false
